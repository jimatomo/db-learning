# 開発: API はコンテナ内 :3000 → ホストは既定 3001、Vite :5173（ブラウザは http://localhost:5173）
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      # ホスト側だけ変更したいとき: DEV_API_PORT=3002 ...
      - "${DEV_API_PORT:-3001}:3000"
      - "${DEV_WEB_PORT:-5173}:5173"
    environment:
      LESSON: ${LESSON:-c}
      DATABASE_PATH: ${DATABASE_PATH:-/data/app-c.db}
      INSIGHTS_ENGINE: ${INSIGHTS_ENGINE:-sqlite}
      ACTOR: docker-dev
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_data:/data

volumes:
  dev_node_modules:
  dev_data:
