# E2E: 本番イメージの app + Playwright ランナー（app とネットワーク共有）
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4173:8080"
    environment:
      PORT: "8080"
      RUN_SEED: "1"
      LESSON: c
      DATABASE_PATH: /data/e2e.db
    volumes:
      - e2e_db:/data
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:8080/api/meta/lesson').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      app:
        condition: service_healthy
    network_mode: service:app
    environment:
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
    volumes:
      - ./e2e:/app/e2e:ro
      - ./playwright.config.ts:/app/playwright.config.ts:ro
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report

volumes:
  e2e_db:
